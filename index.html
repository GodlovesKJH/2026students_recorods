<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 기록 노트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif; background: #f8fafc; color: #1e293b; }
  details summary::-webkit-details-marker { display: none; }
  textarea:focus { border-color: #1e293b !important; box-shadow: 0 0 0 3px rgba(30,41,59,.1); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes fadeUp { from{opacity:0;transform:translate(-50%,20px)} to{opacity:1;transform:translate(-50%,0)} }
  select, input, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SCRIPT_URL_KEY = "srnote_script_url_v3";
const API_KEY_KEY = "srnote_api_key_v1";

const TYPE_META = {
  "관찰":     { color: "#2563eb", bg: "#eff6ff", icon: "👁️" },
  "상담":     { color: "#059669", bg: "#ecfdf5", icon: "💬" },
  "학부모상담": { color: "#d97706", bg: "#fffbeb", icon: "📞" },
  "특이사항": { color: "#dc2626", bg: "#fef2f2", icon: "⚠️" },
};

const APPS_SCRIPT_CODE = `function doGet(e) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const action = e.parameter.action;
  try {
    if (action === 'getRecords') {
      const s = ss.getSheetByName('Records');
      return res({ success: true, data: s.getDataRange().getValues() });
    }
    if (action === 'getStudents') {
      const s = ss.getSheetByName('Students');
      return res({ success: true, data: s.getDataRange().getValues() });
    }
    if (action === 'init') {
      const sr = ss.getSheetByName('Students');
      if (sr.getLastRow() === 0)
        sr.appendRow(['학생ID','이름','성별','학년','반','번호','학기','메모','생성일']);
      const rr = ss.getSheetByName('Records');
      if (rr.getLastRow() === 0)
        rr.appendRow(['기록ID','학생이름','날짜','학기','기록유형','요약','내용','태그','원문','생성시간']);
      return res({ success: true });
    }
  } catch(err) { return res({ success: false, error: err.toString() }); }
  return res({ success: false, error: 'unknown action' });
}
function doPost(e) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  try {
    const b = JSON.parse(e.postData.contents);
    if (b.action === 'addRecord') {
      ss.getSheetByName('Records').appendRow(
        [b.id,b.studentName,b.date,b.semester,b.type,b.summary,b.content,b.tags,b.raw,b.createdAt]
      );
    }
    if (b.action === 'addStudent') {
      ss.getSheetByName('Students').appendRow(
        [b.id,b.name,b.gender,b.grade,b.classNum,b.number,b.semester,b.memo,b.createdAt]
      );
    }
    return ContentService.createTextOutput(JSON.stringify({success:true})).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({success:false,error:err.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}
function res(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);
}`;

function getSemester() {
  const d = new Date(), m = d.getMonth() + 1;
  return `${d.getFullYear()}-${m >= 3 && m <= 8 ? 1 : 2}`;
}
function fmtDate(str) {
  if (!str) return "";
  const d = new Date(str);
  return isNaN(d) ? str : d.toLocaleDateString("ko-KR", { month: "long", day: "numeric", weekday: "short" });
}

async function callClaude(text, apiKey) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true", "Access-Control-Allow-Origin": "*" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: `초등학교 교사의 학생 기록을 분석합니다. 반드시 JSON만 응답하세요. 다른 텍스트 없이.
{"records":[{"studentName":"학생 이름(모르면 미상)","type":"관찰|상담|학부모상담|특이사항","summary":"한줄요약(20자이내)","content":"정제된내용","tags":["태그1"]}]}
분류: 관찰=수업태도/행동, 상담=학생1:1대화, 학부모상담=부모전화/면담, 특이사항=사건사고
여러 학생 언급시 각각 분리`,
      messages: [{ role: "user", content: `분석:\n"${text}"` }],
    }),
  });
  const data = await r.json();
  const raw = data.content?.find(b => b.type === "text")?.text || "{}";
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

// ── 설정 마법사 ──
function SetupWizard({ onComplete }) {
  const [step, setStep] = useState(1);
  const [url, setUrl] = useState("");
  const [copied, setCopied] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testMsg, setTestMsg] = useState("");

  const copyCode = () => {
    navigator.clipboard.writeText(APPS_SCRIPT_CODE);
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  };

  const testConnection = async () => {
    if (!url.trim()) return;
    setTesting(true); setTestMsg("");
    try {
      const r = await fetch(`${url.trim()}?action=init`);
      const d = await r.json();
      setTestMsg(d.success ? "✅ 연결 성공! 헤더 행도 자동 추가됐어요." : "❌ 오류: " + (d.error || "알 수 없는 오류"));
    } catch { setTestMsg("❌ 연결 실패. URL을 다시 확인해주세요."); }
    setTesting(false);
  };

  const steps = ["구글 시트 만들기", "스크립트 붙여넣기", "배포 & 연결"];

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#f0f4ff,#fdf6ec)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ width:"100%", maxWidth:540 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:52, marginBottom:8 }}>📓</div>
          <div style={{ fontSize:24, fontWeight:900, color:"#1e293b", letterSpacing:-0.5 }}>학생 기록 노트</div>
          <div style={{ fontSize:13, color:"#64748b", marginTop:6 }}>구글 시트 연동 설정 (딱 한 번만!)</div>
        </div>

        <div style={{ display:"flex", alignItems:"center", marginBottom:24 }}>
          {steps.map((s, i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", flex: i < 2 ? 1 : "none" }}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <div style={{ width:32, height:32, borderRadius:"50%", background: step>i+1?"#10b981":step===i+1?"#1e293b":"#e2e8f0", color: step>=i+1?"#fff":"#94a3b8", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12 }}>
                  {step>i+1?"✓":i+1}
                </div>
                <div style={{ fontSize:10, color: step===i+1?"#1e293b":"#94a3b8", fontWeight: step===i+1?700:400, whiteSpace:"nowrap" }}>{s}</div>
              </div>
              {i < 2 && <div style={{ flex:1, height:2, background: step>i+1?"#10b981":"#e2e8f0", margin:"0 6px", marginBottom:18 }} />}
            </div>
          ))}
        </div>

        <div style={{ background:"#fff", borderRadius:20, padding:26, boxShadow:"0 4px 24px rgba(0,0,0,.1)" }}>
          {step === 1 && (
            <>
              <div style={{ fontWeight:800, fontSize:17, color:"#1e293b", marginBottom:4 }}>📊 구글 시트 만들기</div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:18 }}>학교 구글 계정으로 진행해주세요</div>
              {[["1","sheets.google.com 접속 (학교 계정 로그인)"],["2","+ 버튼 → 새 스프레드시트 생성"],["3","제목 클릭 → \"학생기록부\" 로 변경"],["4","하단 탭 Sheet1 더블클릭 → \"Students\" 변경"],["5","하단 + 클릭 → 새 탭 → \"Records\" 변경"]].map(([n,t]) => (
                <div key={n} style={{ display:"flex", gap:10, marginBottom:11, alignItems:"flex-start" }}>
                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#eff6ff", color:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, flexShrink:0 }}>{n}</div>
                  <div style={{ fontSize:13, color:"#374151", paddingTop:3, lineHeight:1.6 }}>{t}</div>
                </div>
              ))}
              <div style={{ background:"#f8fafc", borderRadius:9, padding:11, marginBottom:18, fontSize:12, color:"#64748b" }}>
                💡 완성 후 하단에 <b>Students</b> 와 <b>Records</b> 탭 2개가 보여야 해요
              </div>
              <button onClick={()=>setStep(2)} style={{ width:"100%", padding:13, borderRadius:11, border:"none", background:"#1e293b", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>완료! 다음 단계 →</button>
            </>
          )}

          {step === 2 && (
            <>
              <div style={{ fontWeight:800, fontSize:17, color:"#1e293b", marginBottom:4 }}>⚙️ 스크립트 붙여넣기</div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:18 }}>앱과 구글 시트를 연결하는 코드예요</div>
              {[["1","시트 메뉴 → 확장 프로그램 → Apps Script"],["2","기존 코드 전체 선택(Ctrl+A) 후 삭제"],["3","아래 코드 복사 버튼 클릭 후 붙여넣기"],["4","저장 버튼 클릭 (Ctrl+S)"]].map(([n,t]) => (
                <div key={n} style={{ display:"flex", gap:10, marginBottom:11, alignItems:"flex-start" }}>
                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#f0fdf4", color:"#059669", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, flexShrink:0 }}>{n}</div>
                  <div style={{ fontSize:13, color:"#374151", paddingTop:3, lineHeight:1.6 }}>{t}</div>
                </div>
              ))}
              <div style={{ position:"relative", marginTop:14, marginBottom:18 }}>
                <pre style={{ background:"#1e293b", color:"#94a3b8", borderRadius:11, padding:14, fontSize:10, overflow:"auto", maxHeight:160, lineHeight:1.6, margin:0 }}>{APPS_SCRIPT_CODE}</pre>
                <button onClick={copyCode} style={{ position:"absolute", top:8, right:8, padding:"5px 12px", borderRadius:7, border:"none", cursor:"pointer", fontWeight:700, fontSize:11, background: copied?"#10b981":"rgba(255,255,255,.15)", color:"#fff" }}>
                  {copied?"✅ 복사됨!":"📋 코드 복사"}
                </button>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setStep(1)} style={{ flex:1, padding:12, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>← 이전</button>
                <button onClick={()=>setStep(3)} style={{ flex:2, padding:12, borderRadius:11, border:"none", background:"#1e293b", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>완료! 다음 단계 →</button>
              </div>
            </>
          )}

          {step === 3 && (
            <>
              <div style={{ fontWeight:800, fontSize:17, color:"#1e293b", marginBottom:4 }}>🚀 배포 & 연결</div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:18 }}>스크립트를 배포하면 앱 주소가 생겨요</div>
              {[["1","Apps Script 오른쪽 상단 [배포] 클릭"],["2","[새 배포] 클릭"],["3","유형 ⚙️ → 웹 앱 선택"],["4","다음 사용자로 실행 → 나(내 계정)"],["5","액세스 권한 → 모든 사용자"],["6","[배포] → 권한 허용 → URL 복사"]].map(([n,t]) => (
                <div key={n} style={{ display:"flex", gap:10, marginBottom:10, alignItems:"flex-start" }}>
                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#fff7ed", color:"#d97706", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, flexShrink:0 }}>{n}</div>
                  <div style={{ fontSize:13, color:"#374151", paddingTop:3, lineHeight:1.6 }}>{t}</div>
                </div>
              ))}
              <div style={{ marginTop:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:6 }}>배포 URL 입력</div>
                <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..."
                  style={{ width:"100%", padding:"11px 13px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:12, outline:"none", fontFamily:"monospace" }} />
                {testMsg && <div style={{ marginTop:7, fontSize:13, color: testMsg.startsWith("✅")?"#059669":"#dc2626", fontWeight:600 }}>{testMsg}</div>}
              </div>
              <div style={{ display:"flex", gap:8, marginTop:13 }}>
                <button onClick={()=>setStep(2)} style={{ flex:1, padding:11, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>← 이전</button>
                <button onClick={testConnection} disabled={!url.trim()||testing} style={{ flex:1, padding:11, borderRadius:11, border:"none", cursor:"pointer", fontWeight:700, background: url.trim()?"#3b82f6":"#e2e8f0", color: url.trim()?"#fff":"#94a3b8" }}>
                  {testing?"확인 중...":"🔗 연결 테스트"}
                </button>
                <button onClick={()=>testMsg.startsWith("✅")&&onComplete(url.trim())} disabled={!testMsg.startsWith("✅")} style={{ flex:1, padding:11, borderRadius:11, border:"none", cursor: testMsg.startsWith("✅")?"pointer":"default", fontWeight:700, background: testMsg.startsWith("✅")?"#10b981":"#e2e8f0", color: testMsg.startsWith("✅")?"#fff":"#94a3b8" }}>
                  🎉 시작하기
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── 학생 관리 ──
function StudentManageTab({ students, scriptUrl, semester, onRefresh, showToast }) {
  const empty = { name:"", gender:"남", grade:"", classNum:"", number:"", memo:"" };
  const [form, setForm] = useState(empty);
  const [saving, setSaving] = useState(false);

  const handleAdd = async () => {
    if (!form.name.trim()) { showToast("이름을 입력해주세요", false); return; }
    setSaving(true);
    try {
      await fetch(scriptUrl, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain"},
        body: JSON.stringify({ action:"addStudent", id:`S${Date.now()}`, ...form, name:form.name.trim(), semester, createdAt:new Date().toISOString() }) });
      setTimeout(async()=>{ await onRefresh(); setSaving(false); }, 1500);
      setForm(empty);
      showToast(`${form.name} 학생 추가됐어요!`);
    } catch { showToast("저장 실패", false); setSaving(false); }
  };

  return (
    <div>
      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:14, boxShadow:"0 2px 12px rgba(0,0,0,.07)", border:"1px solid #e8e4dc" }}>
        <div style={{ fontWeight:800, fontSize:15, color:"#1e293b", marginBottom:14 }}>➕ 학생 추가</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {[["name","이름 *","text","김민준"],["grade","학년","number","4"],["classNum","반","number","2"],["number","출석번호","number","7"]].map(([k,l,t,ph]) => (
            <div key={k}>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>{l}</div>
              <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} type={t} placeholder={ph}
                style={{ width:"100%", padding:"9px 11px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }} />
            </div>
          ))}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>성별</div>
            <div style={{ display:"flex", gap:7 }}>
              {["남","여"].map(g => (
                <button key={g} onClick={()=>setForm(f=>({...f,gender:g}))} style={{ flex:1, padding:"9px 0", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background: form.gender===g?"#1e293b":"#f1f5f9", color: form.gender===g?"#fff":"#64748b" }}>
                  {g==="남"?"👦 남":"👧 여"}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>메모 (선택)</div>
            <input value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))} placeholder="알레르기, 주의사항 등"
              style={{ width:"100%", padding:"9px 11px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }} />
          </div>
        </div>
        <button onClick={handleAdd} disabled={saving} style={{ width:"100%", marginTop:14, padding:13, borderRadius:11, border:"none", background: saving?"#94a3b8":"#1e293b", color:"#fff", fontWeight:700, fontSize:14, cursor: saving?"default":"pointer" }}>
          {saving?"저장 중...":"➕ 추가하기"}
        </button>
      </div>
      <div style={{ fontSize:13, fontWeight:700, color:"#94a3b8", marginBottom:9 }}>등록된 학생 ({students.length}명)</div>
      {students.length === 0 ? (
        <div style={{ textAlign:"center", padding:40, color:"#cbd5e1", fontSize:13 }}>아직 등록된 학생이 없어요</div>
      ) : students.map(s => (
        <div key={s.id} style={{ background:"#fff", borderRadius:12, padding:"12px 15px", marginBottom:7, display:"flex", alignItems:"center", gap:11, boxShadow:"0 1px 4px rgba(0,0,0,.05)" }}>
          <div style={{ fontSize:24 }}>{s.gender==="여"?"👧":"👦"}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:800, fontSize:14, color:"#1e293b" }}>{s.name}</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{s.grade&&`${s.grade}학년`} {s.classNum&&`${s.classNum}반`} {s.number&&`${s.number}번`}</div>
          </div>
          {s.memo && <div style={{ fontSize:11, color:"#94a3b8", background:"#f8fafc", borderRadius:6, padding:"3px 8px" }}>{s.memo}</div>}
        </div>
      ))}
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [scriptUrl, setScriptUrl] = useState(null);
  const [apiKey, setApiKey] = useState("");
  const [showApiKey, setShowApiKey] = useState(false);
  const [booting, setBooting] = useState(true);
  const [tab, setTab] = useState("new");
  const [records, setRecords] = useState([]);
  const [students, setStudents] = useState([]);
  const [input, setInput] = useState("");
  const [aiLoading, setAiLoading] = useState(false);
  const [listening, setListening] = useState(false);
  const [preview, setPreview] = useState(null);
  const [toast, setToast] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [filter, setFilter] = useState({ student:"all", type:"all", semester:"all", keyword:"" });
  const recogRef = useRef(null);
  const curSemester = getSemester();

  useEffect(() => {
    const saved = localStorage.getItem(SCRIPT_URL_KEY);
    if (saved) setScriptUrl(saved);
    const savedKey = localStorage.getItem(API_KEY_KEY);
    if (savedKey) setApiKey(savedKey);
    setBooting(false);
  }, []);

  useEffect(() => { if (scriptUrl) loadData(); }, [scriptUrl]);

  const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3000); };

  const loadData = async () => {
    if (!scriptUrl) return;
    setSyncing(true);
    try {
      const [rr, sr] = await Promise.all([
        fetch(`${scriptUrl}?action=getRecords`).then(r=>r.json()),
        fetch(`${scriptUrl}?action=getStudents`).then(r=>r.json()),
      ]);
      if (rr.success && rr.data?.length > 1) {
        setRecords(rr.data.slice(1).reverse().map(r => ({
          id:r[0], studentName:r[1], date:r[2], semester:r[3],
          type:r[4], summary:r[5], content:r[6],
          tags: r[7] ? String(r[7]).split(",").filter(Boolean) : [],
          raw:r[8], createdAt:r[9],
        })));
      }
      if (sr.success && sr.data?.length > 1) {
        setStudents(sr.data.slice(1).map(r => ({
          id:r[0], name:r[1], gender:r[2], grade:r[3], classNum:r[4], number:r[5], semester:r[6], memo:r[7],
        })));
      }
    } catch { showToast("데이터 불러오기 실패", false); }
    setSyncing(false);
  };

  const handleSetupComplete = (url) => {
    localStorage.setItem(SCRIPT_URL_KEY, url);
    setScriptUrl(url);
  };

  const toggleVoice = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { showToast("이 브라우저는 음성 인식을 지원하지 않아요", false); return; }
    if (listening) { recogRef.current?.stop(); setListening(false); return; }
    const r = new SR();
    r.lang="ko-KR"; r.continuous=true; r.interimResults=true;
    r.onresult = e => {
      let final = "";
      let interim = "";
      for (let i = 0; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          final += e.results[i][0].transcript;
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      setInput(final + interim);
    };
    r.onend = () => setListening(false);
    r.start(); recogRef.current=r; setListening(true);
  };

  const handleAnalyze = async () => {
    if (!input.trim()) return;
    if (!apiKey.trim()) { showToast("API 키를 먼저 입력해주세요 (⚙️ 설정 탭)", false); return; }
    setAiLoading(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey.trim(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          system: `초등학교 교사의 학생 기록을 분석합니다. 반드시 JSON만 응답하세요. 다른 텍스트 없이.
{"records":[{"studentName":"학생 이름(모르면 미상)","type":"관찰|상담|학부모상담|특이사항","summary":"한줄요약(20자이내)","content":"정제된내용","tags":["태그1"]}]}`,
          messages: [{ role: "user", content: `분석:\n"${input.trim()}"` }],
        }),
      });
      const data = await r.json();
      if (data.error) {
        if (data.error.type === "authentication_error") { showToast("API 키가 올바르지 않아요. 설정 탭에서 다시 확인해주세요.", false); setAiLoading(false); return; }
        if (data.error.type === "insufficient_quota" || data.error.type === "billing_error") { showToast("크레딧이 부족해요. console.anthropic.com에서 충전해주세요.", false); setAiLoading(false); return; }
        showToast("오류: " + data.error.message, false); setAiLoading(false); return;
      }
      const raw = data.content?.find(b => b.type === "text")?.text || "{}";
      const clean = raw.replace(/```json|```/g, "").trim();
      const { records: parsed } = JSON.parse(clean);
      if (!parsed?.length) { showToast("학생 기록을 찾을 수 없어요. 내용에 학생 이름이 있나요?", false); setAiLoading(false); return; }
      setPreview({ raw: input.trim(), parsed });
    } catch(e) { showToast("오류: " + e.message, false); }
    setAiLoading(false);
  };

  const confirmSave = async () => {
    if (!preview) return;
    const now = new Date().toISOString();
    const date = now.split("T")[0];
    let saved = 0;
    for (const p of preview.parsed) {
      try {
        await fetch(scriptUrl, { method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain"},
          body: JSON.stringify({ action:"addRecord", id:`R${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
            studentName:p.studentName, date, semester:curSemester, type:p.type, summary:p.summary,
            content:p.content, tags:(p.tags||[]).join(","), raw:preview.raw, createdAt:now }) });
        saved++;
      } catch {}
    }
    setTimeout(()=>loadData(), 1800);
    setInput(""); setPreview(null);
    showToast(`${saved}개 기록 저장 완료! ✅`);
    setTab("records");

    (filter.type==="all" || r.type===filter.type) &&
    (filter.semester==="all" || r.semester===filter.semester) &&

  const semesters = [...new Set(records.map(r=>r.semester))].filter(Boolean).sort().reverse();

                <select value={filter.student} onChange={e=>setFilter(f=>({...f,student:e.target.value}))} style={{ padding:"7px 9px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:12, background:"#fff" }}>
                  <option value="all">전체 학생</option>

            {filtered.length === 0 ? (
              <div style={{ textAlign:"center", padding:60, color:"#cbd5e1" }}><div style={{ fontSize:40, marginBottom:8 }}>📭</div><div style={{ fontSize:14 }}>기록이 없어요</div></div>
            ) : filtered.map(rec => {

              return (
                <div key={rec.id} style={{ background:"#fff", borderRadius:14, padding:15, marginBottom:9, borderLeft:`4px solid ${m.color}`, boxShadow:"0 1px 6px rgba(0,0,0,.05)" }}>

                    <span style={{ fontSize:11, fontWeight:700, background:m.color, color:"#fff", borderRadius:20, padding:"2px 9px" }}>{m.icon} {rec.type}</span>

              const info = students.find(s=>s.name===name);
              return (
                <details key={name} style={{ background:"#fff", borderRadius:16, marginBottom:9, overflow:"hidden", boxShadow:"0 1px 8px rgba(0,0,0,.06)" }}>

                    <div style={{ width:42, height:42, borderRadius:"50%", background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>
                      {info?.gender==="여"?"👧":"👦"}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:900, fontSize:15, color:"#1e293b" }}>{name}</div>
                      <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>총 {recs.length}건 · 최근 {recs[0]?.date||"없음"}</div>

                    <div style={{ display:"flex", gap:5, flexWrap:"wrap", justifyContent:"flex-end" }}>

              <div style={{ position:"relative" }}>

                />

              <div style={{ marginTop:10, fontSize:12, color:"#94a3b8", background:"#f8fafc", borderRadius:8, padding:"10px 12px", lineHeight:1.7 }}>

                    </div>
                    <div style={{ fontWeight:700, fontSize:13, color:m.color, marginBottom:4 }}>{p.summary}</div>
                    <div style={{ fontSize:13, color:"#475569", lineHeight:1.7 }}>{p.content}</div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:9 }}>
              <button onClick={()=>setPreview(null)} style={{ flex:1, padding:12, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>취소</button>
              <button onClick={confirmSave} style={{ flex:2, padding:12, borderRadius:11, border:"none", background:"#1e293b", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14 }}>💾 저장하기</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position:"fixed", bottom:22, left:"50%", transform:"translateX(-50%)", background: toast.ok?"#1e293b":"#dc2626", color:"#fff", padding:"11px 22px", borderRadius:30, fontSize:14, fontWeight:700, boxShadow:"0 4px 20px rgba(0,0,0,.2)", zIndex:300, whiteSpace:"nowrap", animation:"fadeUp .3s ease" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
