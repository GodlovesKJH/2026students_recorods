<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 기록 노트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Apple SD Gothic Neo', 'Nanum Gothic', sans-serif; background: #f8fafc; color: #1e293b; }
  details summary::-webkit-details-marker { display: none; }
  textarea:focus { border-color: #1e293b !important; box-shadow: 0 0 0 3px rgba(30,41,59,.1); }
  @keyframes fadeUp { from{opacity:0;transform:translate(-50%,20px)} to{opacity:1;transform:translate(-50%,0)} }
  select, input, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f5f9; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
<script>
// ★ 수정된 Apps Script: 모든 쓰기를 GET으로 처리 → no-cors 문제 해결, 저장 성공 여부 확인 가능
// ★ 삭제(deleteRecord, deleteStudent), 수정(updateRecord) 기능 추가
window.APPS_SCRIPT_CODE = 'function doGet(e) {\n  const ss = SpreadsheetApp.getActiveSpreadsheet();\n  const action = e.parameter.action;\n  try {\n    if (action === \'getRecords\') {\n      const s = ss.getSheetByName(\'Records\');\n      return res({ success: true, data: s.getDataRange().getValues() });\n    }\n    if (action === \'getStudents\') {\n      const s = ss.getSheetByName(\'Students\');\n      return res({ success: true, data: s.getDataRange().getValues() });\n    }\n    if (action === \'init\') {\n      const sr = ss.getSheetByName(\'Students\');\n      if (sr.getLastRow() === 0)\n        sr.appendRow([\'학생ID\',\'이름\',\'성별\',\'학년\',\'반\',\'번호\',\'학기\',\'메모\',\'생성일\']);\n      const rr = ss.getSheetByName(\'Records\');\n      if (rr.getLastRow() === 0)\n        rr.appendRow([\'기록ID\',\'학생이름\',\'날짜\',\'학기\',\'기록유형\',\'요약\',\'내용\',\'태그\',\'원문\',\'생성시간\']);\n      return res({ success: true });\n    }\n    if (action === \'addRecord\') {\n      const p = e.parameter;\n      ss.getSheetByName(\'Records\').appendRow(\n        [p.id, p.studentName, p.date, p.semester, p.type, p.summary, p.content, p.tags, p.raw||\'\', p.createdAt]\n      );\n      return res({ success: true });\n    }\n    if (action === \'addStudent\') {\n      const p = e.parameter;\n      ss.getSheetByName(\'Students\').appendRow(\n        [p.id, p.name, p.gender, p.grade, p.classNum, p.number, p.semester, p.memo, p.createdAt]\n      );\n      return res({ success: true });\n    }\n    if (action === \'deleteRecord\') {\n      const sheet = ss.getSheetByName(\'Records\');\n      const data = sheet.getDataRange().getValues();\n      for (let i = 1; i < data.length; i++) {\n        if (String(data[i][0]) === String(e.parameter.id)) {\n          sheet.deleteRow(i + 1); break;\n        }\n      }\n      return res({ success: true });\n    }\n    if (action === \'deleteStudent\') {\n      const sheet = ss.getSheetByName(\'Students\');\n      const data = sheet.getDataRange().getValues();\n      for (let i = 1; i < data.length; i++) {\n        if (String(data[i][0]) === String(e.parameter.id)) {\n          sheet.deleteRow(i + 1); break;\n        }\n      }\n      return res({ success: true });\n    }\n    if (action === \'updateRecord\') {\n      const p = e.parameter;\n      const sheet = ss.getSheetByName(\'Records\');\n      const data = sheet.getDataRange().getValues();\n      for (let i = 1; i < data.length; i++) {\n        if (String(data[i][0]) === String(p.id)) {\n          const row = i + 1;\n          sheet.getRange(row, 2).setValue(p.studentName);\n          sheet.getRange(row, 5).setValue(p.type);\n          sheet.getRange(row, 6).setValue(p.summary);\n          sheet.getRange(row, 7).setValue(p.content);\n          break;\n        }\n      }\n      return res({ success: true });\n    }\n  } catch(err) { return res({ success: false, error: err.toString() }); }\n  return res({ success: false, error: \'unknown action\' });\n}\nfunction res(obj) {\n  return ContentService.createTextOutput(JSON.stringify(obj)).setMimeType(ContentService.MimeType.JSON);\n}';
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SCRIPT_URL_KEY = "srnote_script_url_v3";
const API_KEY_KEY    = "srnote_api_key_v1";
const APPS_SCRIPT_CODE = window.APPS_SCRIPT_CODE;

const TYPE_META = {
  "관찰":       { color:"#2563eb", bg:"#eff6ff", icon:"👁️" },
  "상담":       { color:"#059669", bg:"#ecfdf5", icon:"💬" },
  "학부모상담": { color:"#d97706", bg:"#fffbeb", icon:"📞" },
  "특이사항":   { color:"#dc2626", bg:"#fef2f2", icon:"⚠️" },
};

function getSemester() {
  const d = new Date(), m = d.getMonth() + 1;
  return `${d.getFullYear()}-${m >= 3 && m <= 8 ? 1 : 2}`;
}
function todayStr() {
  return new Date().toISOString().split("T")[0];
}

// ── 설정 마법사 ──
function SetupWizard({ onComplete }) {
  const [step, setStep]     = useState(1);
  const [url, setUrl]       = useState("");
  const [copied, setCopied] = useState(false);
  const [testing, setTesting] = useState(false);
  const [testMsg, setTestMsg] = useState("");

  const copyCode = () => {
    navigator.clipboard.writeText(APPS_SCRIPT_CODE);
    setCopied(true);
    setTimeout(() => setCopied(false), 2500);
  };

  const testConnection = async () => {
    if (!url.trim()) return;
    setTesting(true); setTestMsg("");
    try {
      const r = await fetch(`${url.trim()}?action=init`);
      const d = await r.json();
      setTestMsg(d.success ? "✅ 연결 성공! 헤더 행도 자동 추가됐어요." : "❌ 오류: " + (d.error || "알 수 없는 오류"));
    } catch { setTestMsg("❌ 연결 실패. URL을 다시 확인해주세요."); }
    setTesting(false);
  };

  const steps = ["구글 시트 만들기","스크립트 붙여넣기","배포 & 연결"];

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#f0f4ff,#fdf6ec)", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ width:"100%", maxWidth:540 }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:52, marginBottom:8 }}>📓</div>
          <div style={{ fontSize:24, fontWeight:900, color:"#1e293b", letterSpacing:-0.5 }}>학생 기록 노트</div>
          <div style={{ fontSize:13, color:"#64748b", marginTop:6 }}>구글 시트 연동 설정 (딱 한 번만!)</div>
        </div>

        <div style={{ display:"flex", alignItems:"center", marginBottom:24 }}>
          {steps.map((s,i) => (
            <div key={i} style={{ display:"flex", alignItems:"center", flex:i<2?1:"none" }}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <div style={{ width:32, height:32, borderRadius:"50%", background:step>i+1?"#10b981":step===i+1?"#1e293b":"#e2e8f0", color:step>=i+1?"#fff":"#94a3b8", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:12 }}>
                  {step>i+1?"✓":i+1}
                </div>
                <div style={{ fontSize:10, color:step===i+1?"#1e293b":"#94a3b8", fontWeight:step===i+1?700:400, whiteSpace:"nowrap" }}>{s}</div>
              </div>
              {i<2 && <div style={{ flex:1, height:2, background:step>i+1?"#10b981":"#e2e8f0", margin:"0 6px", marginBottom:18 }} />}
            </div>
          ))}
        </div>

        <div style={{ background:"#fff", borderRadius:20, padding:26, boxShadow:"0 4px 24px rgba(0,0,0,.1)" }}>
          {step===1 && (
            <>
              <div style={{ fontWeight:800, fontSize:17, color:"#1e293b", marginBottom:4 }}>📊 구글 시트 만들기</div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:18 }}>학교 구글 계정으로 진행해주세요</div>
              {[["1","sheets.google.com 접속 (학교 계정 로그인)"],["2","+ 버튼 → 새 스프레드시트 생성"],["3","제목 클릭 → \"학생기록부\" 로 변경"],["4","하단 탭 Sheet1 더블클릭 → \"Students\" 변경"],["5","하단 + 클릭 → 새 탭 → \"Records\" 변경"]].map(([n,t]) => (
                <div key={n} style={{ display:"flex", gap:10, marginBottom:11, alignItems:"flex-start" }}>
                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#eff6ff", color:"#2563eb", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, flexShrink:0 }}>{n}</div>
                  <div style={{ fontSize:13, color:"#374151", paddingTop:3, lineHeight:1.6 }}>{t}</div>
                </div>
              ))}
              <div style={{ background:"#f8fafc", borderRadius:9, padding:11, marginBottom:18, fontSize:12, color:"#64748b" }}>
                💡 완성 후 하단에 <b>Students</b> 와 <b>Records</b> 탭 2개가 보여야 해요
              </div>
              <button onClick={()=>setStep(2)} style={{ width:"100%", padding:13, borderRadius:11, border:"none", background:"#1e293b", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>완료! 다음 단계 →</button>
            </>
          )}

          {step===2 && (
            <>
              <div style={{ fontWeight:800, fontSize:17, color:"#1e293b", marginBottom:4 }}>⚙️ 스크립트 붙여넣기</div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:14 }}>앱과 구글 시트를 연결하는 코드예요</div>
              <div style={{ background:"#fffbeb", borderRadius:9, padding:"10px 13px", fontSize:12, color:"#92400e", border:"1px solid #fde68a", marginBottom:14, lineHeight:1.7 }}>
                ⚠️ <b>기존 사용자:</b> 코드 교체 후 [배포] → [배포 관리] → ✏️ 편집 → 버전을 <b>'최신 버전'</b>으로 변경 → 저장하세요.
              </div>
              {[["1","시트 메뉴 → 확장 프로그램 → Apps Script"],["2","기존 코드 전체 선택(Ctrl+A) 후 삭제"],["3","아래 코드 복사 버튼 클릭 후 붙여넣기"],["4","저장 버튼 클릭 (Ctrl+S)"]].map(([n,t]) => (
                <div key={n} style={{ display:"flex", gap:10, marginBottom:11, alignItems:"flex-start" }}>
                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#f0fdf4", color:"#059669", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, flexShrink:0 }}>{n}</div>
                  <div style={{ fontSize:13, color:"#374151", paddingTop:3, lineHeight:1.6 }}>{t}</div>
                </div>
              ))}
              <div style={{ position:"relative", marginTop:14, marginBottom:18 }}>
                <pre style={{ background:"#1e293b", color:"#94a3b8", borderRadius:11, padding:14, fontSize:10, overflow:"auto", maxHeight:160, lineHeight:1.6, margin:0 }}>{APPS_SCRIPT_CODE}</pre>
                <button onClick={copyCode} style={{ position:"absolute", top:8, right:8, padding:"5px 12px", borderRadius:7, border:"none", cursor:"pointer", fontWeight:700, fontSize:11, background:copied?"#10b981":"rgba(255,255,255,.15)", color:"#fff" }}>
                  {copied?"✅ 복사됨!":"📋 코드 복사"}
                </button>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={()=>setStep(1)} style={{ flex:1, padding:12, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>← 이전</button>
                <button onClick={()=>setStep(3)} style={{ flex:2, padding:12, borderRadius:11, border:"none", background:"#1e293b", color:"#fff", fontWeight:700, fontSize:14, cursor:"pointer" }}>완료! 다음 단계 →</button>
              </div>
            </>
          )}

          {step===3 && (
            <>
              <div style={{ fontWeight:800, fontSize:17, color:"#1e293b", marginBottom:4 }}>🚀 배포 & 연결</div>
              <div style={{ fontSize:12, color:"#64748b", marginBottom:18 }}>스크립트를 배포하면 앱 주소가 생겨요</div>
              {[["1","Apps Script 오른쪽 상단 [배포] 클릭"],["2","[새 배포] 클릭"],["3","유형 ⚙️ → 웹 앱 선택"],["4","다음 사용자로 실행 → 나(내 계정)"],["5","액세스 권한 → 모든 사용자"],["6","[배포] → 권한 허용 → URL 복사"]].map(([n,t]) => (
                <div key={n} style={{ display:"flex", gap:10, marginBottom:10, alignItems:"flex-start" }}>
                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#fff7ed", color:"#d97706", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800, fontSize:11, flexShrink:0 }}>{n}</div>
                  <div style={{ fontSize:13, color:"#374151", paddingTop:3, lineHeight:1.6 }}>{t}</div>
                </div>
              ))}
              <div style={{ marginTop:14 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:6 }}>배포 URL 입력</div>
                <input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..."
                  style={{ width:"100%", padding:"11px 13px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:12, outline:"none", fontFamily:"monospace" }} />
                {testMsg && <div style={{ marginTop:7, fontSize:13, color:testMsg.startsWith("✅")?"#059669":"#dc2626", fontWeight:600 }}>{testMsg}</div>}
              </div>
              <div style={{ display:"flex", gap:8, marginTop:13 }}>
                <button onClick={()=>setStep(2)} style={{ flex:1, padding:11, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>← 이전</button>
                <button onClick={testConnection} disabled={!url.trim()||testing} style={{ flex:1, padding:11, borderRadius:11, border:"none", cursor:"pointer", fontWeight:700, background:url.trim()?"#3b82f6":"#e2e8f0", color:url.trim()?"#fff":"#94a3b8" }}>
                  {testing?"확인 중...":"🔗 연결 테스트"}
                </button>
                <button onClick={()=>testMsg.startsWith("✅")&&onComplete(url.trim())} disabled={!testMsg.startsWith("✅")} style={{ flex:1, padding:11, borderRadius:11, border:"none", cursor:testMsg.startsWith("✅")?"pointer":"default", fontWeight:700, background:testMsg.startsWith("✅")?"#10b981":"#e2e8f0", color:testMsg.startsWith("✅")?"#fff":"#94a3b8" }}>
                  🎉 시작하기
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── 학생 관리 탭 ──
function StudentManageTab({ students, scriptUrl, semester, onRefresh, showToast, onDeleteStudent }) {
  const empty = { name:"", gender:"남", grade:"", classNum:"", number:"", memo:"" };
  const [form, setForm]         = useState(empty);
  const [saving, setSaving]     = useState(false);
  const [deletingId, setDeletingId] = useState(null);

  const handleAdd = async () => {
    if (!form.name.trim()) { showToast("이름을 입력해주세요", false); return; }
    setSaving(true);
    try {
      // ★ GET 방식으로 저장 → 성공 여부 확인 가능
      const params = new URLSearchParams({
        action:"addStudent", id:`S${Date.now()}`,
        name:form.name.trim(), gender:form.gender,
        grade:form.grade, classNum:form.classNum,
        number:form.number, memo:form.memo,
        semester, createdAt:new Date().toISOString(),
      });
      const r = await fetch(`${scriptUrl}?${params}`);
      const d = await r.json();
      if (d.success) {
        showToast(`${form.name} 학생 추가됐어요! ✅`);
        setForm(empty);
        setTimeout(() => onRefresh(), 1000);
      } else {
        showToast("저장 실패: " + (d.error||""), false);
      }
    } catch { showToast("저장 실패", false); }
    setSaving(false);
  };

  // ★ 학생 삭제
  const handleDelete = async (s) => {
    if (!window.confirm(`"${s.name}" 학생을 삭제할까요?\n이 학생의 기록은 유지됩니다.`)) return;
    setDeletingId(s.id);
    try {
      const r = await fetch(`${scriptUrl}?action=deleteStudent&id=${encodeURIComponent(s.id)}`);
      const d = await r.json();
      if (d.success) { onDeleteStudent(s.id); showToast(`${s.name} 삭제됐어요`); }
      else showToast("삭제 실패", false);
    } catch { showToast("삭제 실패", false); }
    setDeletingId(null);
  };

  return (
    <div>
      <div style={{ background:"#fff", borderRadius:16, padding:20, marginBottom:14, boxShadow:"0 2px 12px rgba(0,0,0,.07)", border:"1px solid #e8e4dc" }}>
        <div style={{ fontWeight:800, fontSize:15, color:"#1e293b", marginBottom:14 }}>➕ 학생 추가</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {[["name","이름 *","text","김민준"],["grade","학년","number","4"],["classNum","반","number","2"],["number","출석번호","number","7"]].map(([k,l,t,ph]) => (
            <div key={k}>
              <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>{l}</div>
              <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} type={t} placeholder={ph}
                style={{ width:"100%", padding:"9px 11px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }} />
            </div>
          ))}
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>성별</div>
            <div style={{ display:"flex", gap:7 }}>
              {["남","여"].map(g => (
                <button key={g} onClick={()=>setForm(f=>({...f,gender:g}))} style={{ flex:1, padding:"9px 0", borderRadius:8, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background:form.gender===g?"#1e293b":"#f1f5f9", color:form.gender===g?"#fff":"#64748b" }}>
                  {g==="남"?"👦 남":"👧 여"}
                </button>
              ))}
            </div>
          </div>
          <div>
            <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>메모 (선택)</div>
            <input value={form.memo} onChange={e=>setForm(f=>({...f,memo:e.target.value}))} placeholder="알레르기, 주의사항 등"
              style={{ width:"100%", padding:"9px 11px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }} />
          </div>
        </div>
        <button onClick={handleAdd} disabled={saving} style={{ width:"100%", marginTop:14, padding:13, borderRadius:11, border:"none", background:saving?"#94a3b8":"#1e293b", color:"#fff", fontWeight:700, fontSize:14, cursor:saving?"default":"pointer" }}>
          {saving?"저장 중...":"➕ 추가하기"}
        </button>
      </div>

      <div style={{ fontSize:13, fontWeight:700, color:"#94a3b8", marginBottom:9 }}>등록된 학생 ({students.length}명)</div>
      {students.length===0 ? (
        <div style={{ textAlign:"center", padding:40, color:"#cbd5e1", fontSize:13 }}>아직 등록된 학생이 없어요</div>
      ) : students.map(s => (
        <div key={s.id} style={{ background:"#fff", borderRadius:12, padding:"12px 15px", marginBottom:7, display:"flex", alignItems:"center", gap:11, boxShadow:"0 1px 4px rgba(0,0,0,.05)" }}>
          <div style={{ fontSize:24 }}>{s.gender==="여"?"👧":"👦"}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:800, fontSize:14, color:"#1e293b" }}>{s.name}</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{s.grade&&`${s.grade}학년`} {s.classNum&&`${s.classNum}반`} {s.number&&`${s.number}번`}</div>
          </div>
          {s.memo && <div style={{ fontSize:11, color:"#94a3b8", background:"#f8fafc", borderRadius:6, padding:"3px 8px" }}>{s.memo}</div>}
          {/* ★ 삭제 버튼 */}
          <button onClick={()=>handleDelete(s)} disabled={deletingId===s.id}
            style={{ padding:"6px 11px", borderRadius:8, border:"1.5px solid #fca5a5", background:"#fff", color:"#dc2626", cursor:"pointer", fontSize:12, fontWeight:700, flexShrink:0 }}>
            {deletingId===s.id?"...":"🗑️ 삭제"}
          </button>
        </div>
      ))}
    </div>
  );
}

// ★ 기록 수정 모달 ──
function EditRecordModal({ record, scriptUrl, onSaved, onClose }) {
  const [form, setForm]   = useState({ studentName:record.studentName, type:record.type, summary:record.summary, content:record.content });
  const [saving, setSaving] = useState(false);
  const [err, setErr]     = useState("");

  const handleSave = async () => {
    if (!form.studentName.trim()) { setErr("학생 이름을 입력해주세요"); return; }
    setSaving(true); setErr("");
    try {
      const params = new URLSearchParams({ action:"updateRecord", id:record.id, ...form });
      const r = await fetch(`${scriptUrl}?${params}`);
      const d = await r.json();
      if (d.success) { onSaved({ ...record, ...form }); }
      else setErr("수정 실패: " + (d.error||""));
    } catch { setErr("수정 실패. 다시 시도해주세요."); }
    setSaving(false);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,.65)", zIndex:300, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ background:"#fff", borderRadius:20, padding:24, maxWidth:500, width:"100%", maxHeight:"92vh", overflow:"auto", boxShadow:"0 24px 64px rgba(0,0,0,.3)" }}>
        <div style={{ fontWeight:900, fontSize:17, color:"#1e293b", marginBottom:16 }}>✏️ 기록 수정</div>

        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>학생 이름</div>
          <input value={form.studentName} onChange={e=>setForm(f=>({...f,studentName:e.target.value}))}
            style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none", fontWeight:700 }} />
        </div>

        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>기록 유형</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:7 }}>
            {Object.entries(TYPE_META).map(([t,m]) => (
              <button key={t} onClick={()=>setForm(f=>({...f,type:t}))}
                style={{ padding:"10px", borderRadius:9, border:form.type===t?`2px solid ${m.color}`:"1.5px solid #e2e8f0", background:form.type===t?m.bg:"#fff", cursor:"pointer", fontWeight:700, fontSize:12, color:form.type===t?m.color:"#64748b" }}>
                {m.icon} {t}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>한줄 요약</div>
          <input value={form.summary} onChange={e=>setForm(f=>({...f,summary:e.target.value}))}
            style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none" }} />
        </div>

        <div style={{ marginBottom:18 }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#64748b", marginBottom:5 }}>내용</div>
          <textarea value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))} rows={4}
            style={{ width:"100%", padding:"10px 12px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:14, outline:"none", resize:"vertical", fontFamily:"inherit", lineHeight:1.7 }} />
        </div>

        {err && <div style={{ marginBottom:12, fontSize:13, color:"#dc2626", fontWeight:600 }}>{err}</div>}

        <div style={{ display:"flex", gap:9 }}>
          <button onClick={onClose} style={{ flex:1, padding:12, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>취소</button>
          <button onClick={handleSave} disabled={saving}
            style={{ flex:2, padding:12, borderRadius:11, border:"none", background:saving?"#94a3b8":"#1e293b", color:"#fff", cursor:saving?"default":"pointer", fontWeight:700, fontSize:14 }}>
            {saving?"저장 중...":"💾 수정 완료"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [scriptUrl, setScriptUrl]     = useState(null);
  const [apiKey, setApiKey]           = useState("");
  const [showApiKey, setShowApiKey]   = useState(false);
  const [booting, setBooting]         = useState(true);
  const [tab, setTab]                 = useState("new");
  const [records, setRecords]         = useState([]);
  const [students, setStudents]       = useState([]);
  const [input, setInput]             = useState("");
  const [aiLoading, setAiLoading]     = useState(false);
  const [preview, setPreview]         = useState(null);   // { raw, parsed[] }
  const [toast, setToast]             = useState(null);
  const [syncing, setSyncing]         = useState(false);
  const [filter, setFilter]           = useState({ student:"all", type:"all", semester:"all", keyword:"" });
  const [recordDate, setRecordDate]   = useState(todayStr()); // ★ 날짜 수동 지정
  const [editingRec, setEditingRec]   = useState(null);   // ★ 기록 수정 모달
  const [deletingId, setDeletingId]   = useState(null);
  const curSemester   = getSemester();

  useEffect(() => {
    const saved = localStorage.getItem(SCRIPT_URL_KEY);
    if (saved) setScriptUrl(saved);
    // ★ API 키: sessionStorage 사용 (탭 닫으면 자동 삭제 → 보안 강화)
    const savedKey = sessionStorage.getItem(API_KEY_KEY);
    if (savedKey) setApiKey(savedKey);
    setBooting(false);
  }, []);

  useEffect(() => { if (scriptUrl) loadData(); }, [scriptUrl]);

  const showToast = (msg, ok=true) => { setToast({msg,ok}); setTimeout(()=>setToast(null),3200); };

  const loadData = async () => {
    if (!scriptUrl) return;
    setSyncing(true);
    try {
      const [rr,sr] = await Promise.all([
        fetch(`${scriptUrl}?action=getRecords`).then(r=>r.json()),
        fetch(`${scriptUrl}?action=getStudents`).then(r=>r.json()),
      ]);
      if (rr.success && rr.data?.length > 1) {
        setRecords(rr.data.slice(1).reverse().map(r => ({
          id:r[0], studentName:r[1], date:r[2], semester:r[3],
          type:r[4], summary:r[5], content:r[6],
          tags: r[7] ? String(r[7]).split(",").filter(Boolean) : [],
          raw:r[8], createdAt:r[9],
        })));
      }
      if (sr.success && sr.data?.length > 1) {
        setStudents(sr.data.slice(1).map(r => ({
          id:r[0], name:r[1], gender:r[2], grade:r[3], classNum:r[4], number:r[5], semester:r[6], memo:r[7],
        })));
      }
    } catch { showToast("데이터 불러오기 실패", false); }
    setSyncing(false);
  };

  // ── AI 분류 ──
  const handleAnalyze = async () => {
    if (!input.trim()) return;
    if (!apiKey.trim()) { showToast("API 키를 먼저 입력해주세요 (⚙️ 설정 탭)", false); return; }
    setAiLoading(true);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":apiKey.trim(), "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:1000,
          system:`초등학교 교사의 학생 기록을 분석합니다. 반드시 JSON만 응답하세요. 다른 텍스트 없이.
{"records":[{"studentName":"학생 이름","type":"관찰|상담|학부모상담|특이사항","summary":"한줄요약(20자이내)","content":"정제된내용","tags":["태그1"]}]}
분류: 관찰=수업태도/행동, 상담=학생1:1대화, 학부모상담=부모전화/면담, 특이사항=사건사고
여러 학생 언급시 각각 분리

[등록된 학생 명단]
${students.length > 0 ? students.map(s=>s.name).join(", ") : "없음"}

이름 매칭 규칙:
- 텍스트에 이름 일부(예: "사율이")만 나와도 명단에서 해당 학생의 전체 이름(예: "홍사율")으로 반드시 변환
- 동명이인 없으므로 이름 일부만으로도 확실히 매칭 가능
- 명단에 없는 이름은 들린 그대로 저장`,
          messages:[{ role:"user", content:`분석:\n"${input.trim()}"` }],
        }),
      });
      const data = await r.json();
      if (data.error) {
        if (data.error.type==="authentication_error") { showToast("API 키가 올바르지 않아요.", false); setAiLoading(false); return; }
        if (data.error.type==="insufficient_quota"||data.error.type==="billing_error") { showToast("크레딧이 부족해요.", false); setAiLoading(false); return; }
        showToast("오류: " + data.error.message, false); setAiLoading(false); return;
      }
      const raw   = data.content?.find(b=>b.type==="text")?.text || "{}";
      const clean = raw.replace(/```json|```/g,"").trim();
      const { records: parsed } = JSON.parse(clean);
      if (!parsed?.length) { showToast("학생 기록을 찾을 수 없어요.", false); setAiLoading(false); return; }
      setPreview({ raw:input.trim(), parsed });
    } catch(e) { showToast("오류: " + e.message, false); }
    setAiLoading(false);
  };

  // ★ 미리보기 항목 수정
  const updatePreview = (i, field, val) => {
    setPreview(prev => ({ ...prev, parsed: prev.parsed.map((p,idx) => idx===i ? {...p,[field]:val} : p) }));
  };

  // ★ 저장: GET 방식 → 성공 여부 확인 가능
  const confirmSave = async () => {
    if (!preview) return;
    const now = new Date().toISOString();
    let saved = 0;
    for (const p of preview.parsed) {
      try {
        const params = new URLSearchParams({
          action:"addRecord",
          id:`R${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
          studentName:p.studentName, date:recordDate,
          semester:curSemester, type:p.type,
          summary:p.summary, content:p.content,
          tags:(p.tags||[]).join(","),
          raw:(preview.raw||"").substring(0,400),
          createdAt:now,
        });
        const r = await fetch(`${scriptUrl}?${params}`);
        const d = await r.json();
        if (d.success) saved++;
      } catch {}
    }
    if (saved > 0) {
      await loadData();
      setInput(""); setPreview(null);
      showToast(`${saved}개 기록 저장 완료! ✅`);
      setTab("records");
    } else {
      showToast("저장 실패. 다시 시도해주세요.", false);
    }
  };

  // ★ 기록 삭제
  const handleDeleteRecord = async (id) => {
    if (!window.confirm("이 기록을 삭제할까요?")) return;
    setDeletingId(id);
    try {
      const r = await fetch(`${scriptUrl}?action=deleteRecord&id=${encodeURIComponent(id)}`);
      const d = await r.json();
      if (d.success) { setRecords(prev=>prev.filter(rec=>rec.id!==id)); showToast("기록 삭제됐어요"); }
      else showToast("삭제 실패", false);
    } catch { showToast("삭제 실패", false); }
    setDeletingId(null);
  };

  // ★ 기록 수정 완료
  const handleRecordSaved = (updated) => {
    setRecords(prev => prev.map(r => r.id===updated.id ? updated : r));
    setEditingRec(null);
    showToast("수정됐어요 ✅");
  };

  // ★ 검색: studentName 포함 (버그 수정)
  const filtered = records.filter(r =>
    (filter.student==="all" || r.studentName===filter.student) &&
    (filter.type==="all"    || r.type===filter.type) &&
    (filter.semester==="all"|| r.semester===filter.semester) &&
    (!filter.keyword || [r.studentName, r.content, r.summary, ...(r.tags||[])].join(" ").includes(filter.keyword))
  );
  const uniqueStudentNames = [...new Set(records.map(r=>r.studentName))].filter(Boolean);
  const semesters = [...new Set(records.map(r=>r.semester))].filter(Boolean).sort().reverse();

  if (booting) return <div style={{ height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"#94a3b8" }}>로딩 중...</div>;
  if (!scriptUrl) return <SetupWizard onComplete={url=>{ localStorage.setItem(SCRIPT_URL_KEY,url); setScriptUrl(url); }} />;

  const TABS = [["new","📝","새 기록"],["records","📋","전체 기록"],["students","👥","학생별"],["manage","👤","학생 관리"],["settings","⚙️","설정"]];

  return (
    <div style={{ fontFamily:"'Apple SD Gothic Neo','Nanum Gothic',sans-serif", background:"#f8fafc", minHeight:"100vh" }}>
      <header style={{ background:"#fff", borderBottom:"1px solid #e8e4dc", padding:"13px 18px", display:"flex", alignItems:"center", gap:10, position:"sticky", top:0, zIndex:100, boxShadow:"0 1px 8px rgba(0,0,0,.06)" }}>
        <div style={{ fontSize:24 }}>📓</div>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:900, fontSize:16, letterSpacing:-0.5 }}>학생 기록 노트</div>
          <div style={{ fontSize:11, color:"#94a3b8" }}>{curSemester}학기 · {records.length}건</div>
        </div>
        <button onClick={loadData} style={{ padding:"7px 13px", borderRadius:8, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:12, color:"#64748b", fontWeight:600 }}>
          {syncing?"⏳ 동기화 중...":"🔄 새로고침"}
        </button>
      </header>

      <div style={{ background:"#fff", borderBottom:"1px solid #e8e4dc", display:"flex" }}>
        {TABS.map(([v,icon,label]) => (
          <button key={v} onClick={()=>setTab(v)} style={{ flex:1, padding:"11px 6px", border:"none", background:"none", cursor:"pointer", fontWeight:tab===v?800:500, fontSize:12, whiteSpace:"nowrap", color:tab===v?"#1e293b":"#94a3b8", borderBottom:`2px solid ${tab===v?"#1e293b":"transparent"}`, transition:"all .15s" }}>
            {icon} {label}
          </button>
        ))}
      </div>

      <div style={{ maxWidth:720, margin:"0 auto", padding:"18px 14px" }}>

        {/* ── 새 기록 탭 ── */}
        {tab==="new" && (
          <div>
            <div style={{ background:"#fff", borderRadius:16, padding:20, boxShadow:"0 2px 12px rgba(0,0,0,.07)", border:"1px solid #e8e4dc", marginBottom:14 }}>
              {/* ★ 날짜 선택 */}
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:11 }}>
                <div style={{ fontSize:12, fontWeight:700, color:"#94a3b8", textTransform:"uppercase", letterSpacing:1 }}>기록 입력</div>
                <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                  <span style={{ fontSize:11, color:"#64748b", fontWeight:600 }}>📅 기록 날짜</span>
                  <input type="date" value={recordDate} onChange={e=>setRecordDate(e.target.value)}
                    style={{ padding:"5px 9px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:12, outline:"none", color:"#374151", background:"#f8fafc", cursor:"pointer" }} />
                </div>
              </div>
              <textarea value={input} onChange={e=>setInput(e.target.value)}
                placeholder={"갤럭시 키보드 마이크로 말하거나 직접 입력하세요.\n\n예) 오늘 김민준이가 수업 중 집중을 못 했어. 이수아 엄마한테서 전화 왔는데 아이가 학교 가기 싫다고 한대."}
                rows={6} style={{ width:"100%", resize:"vertical", border:"1.5px solid #e2e8f0", borderRadius:11, padding:"13px 15px", fontSize:14, lineHeight:1.8, outline:"none", background:"#fafafa", fontFamily:"inherit", color:"#1e293b" }}
                onFocus={e=>e.target.style.borderColor="#1e293b"} onBlur={e=>e.target.style.borderColor="#e2e8f0"} />
              <div style={{ display:"flex", justifyContent:"flex-end", marginTop:12 }}>
                <button onClick={handleAnalyze} disabled={aiLoading||!input.trim()}
                  style={{ padding:"10px 20px", borderRadius:10, border:"none", cursor:input.trim()?"pointer":"default", background:input.trim()?"#1e293b":"#e2e8f0", color:input.trim()?"#fff":"#94a3b8", fontWeight:700, fontSize:14 }}>
                  {aiLoading?"✨ AI 분석 중...":"✨ AI 분류"}
                </button>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:9, marginBottom:12 }}>
              {Object.entries(TYPE_META).map(([type,m]) => (
                <div key={type} style={{ background:"#fff", borderRadius:12, padding:"11px 14px", borderLeft:`4px solid ${m.color}` }}>
                  <div style={{ fontWeight:700, fontSize:13, color:m.color }}>{m.icon} {type}</div>
                  <div style={{ fontSize:11, color:"#94a3b8", marginTop:3 }}>
                    {type==="관찰"?"수업태도, 행동, 교우관계":type==="상담"?"학생과 1:1 대화":type==="학부모상담"?"부모님 전화/면담":"사건, 사고, 긴급상황"}
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background:"#fffbeb", borderRadius:12, padding:"11px 14px", fontSize:12, color:"#92400e", border:"1px solid #fde68a" }}>
              💡 <b>갤럭시 입력 팁:</b> 키보드 마이크 버튼으로 말하면 바로 입력돼요. 통화 녹음 자동 변환 텍스트를 붙여넣으면 학부모 상담도 자동 분류돼요!
            </div>
          </div>
        )}

        {/* ── 전체 기록 탭 ── */}
        {tab==="records" && (
          <div>
            <div style={{ background:"#fff", borderRadius:14, padding:15, marginBottom:13, border:"1px solid #e8e4dc" }}>
              {/* ★ 검색에 이름 포함 (버그 수정) */}
              <input value={filter.keyword} onChange={e=>setFilter(f=>({...f,keyword:e.target.value}))} placeholder="🔍 키워드 검색 (이름, 내용, 태그)"
                style={{ width:"100%", padding:"9px 13px", borderRadius:9, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", marginBottom:9 }} />
              <div style={{ display:"flex", gap:7, flexWrap:"wrap" }}>
                <select value={filter.semester} onChange={e=>setFilter(f=>({...f,semester:e.target.value}))} style={{ padding:"7px 9px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:12, background:"#fff" }}>
                  <option value="all">전체 학기</option>
                  {semesters.map(s=><option key={s} value={s}>{s}학기</option>)}
                </select>
                <select value={filter.student} onChange={e=>setFilter(f=>({...f,student:e.target.value}))} style={{ padding:"7px 9px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:12, background:"#fff" }}>
                  <option value="all">전체 학생</option>
                  {uniqueStudentNames.map(s=><option key={s} value={s}>{s}</option>)}
                </select>
                {["all","관찰","상담","학부모상담","특이사항"].map(t => {
                  const m=TYPE_META[t]; const active=filter.type===t;
                  return <button key={t} onClick={()=>setFilter(f=>({...f,type:t}))} style={{ padding:"6px 11px", borderRadius:8, border:"none", cursor:"pointer", fontSize:12, fontWeight:600, background:active?(m?.color||"#1e293b"):"#f1f5f9", color:active?"#fff":"#64748b" }}>{t==="all"?"전체":`${m.icon} ${t}`}</button>;
                })}
              </div>
              <div style={{ fontSize:12, color:"#94a3b8", marginTop:7 }}>{filtered.length}건</div>
            </div>
            {filtered.length===0 ? (
              <div style={{ textAlign:"center", padding:60, color:"#cbd5e1" }}><div style={{ fontSize:40, marginBottom:8 }}>📭</div><div style={{ fontSize:14 }}>기록이 없어요</div></div>
            ) : filtered.map(rec => {
              const m = TYPE_META[rec.type] || { color:"#64748b", bg:"#f8fafc", icon:"📝" };
              return (
                <div key={rec.id} style={{ background:"#fff", borderRadius:14, padding:15, marginBottom:9, borderLeft:`4px solid ${m.color}`, boxShadow:"0 1px 6px rgba(0,0,0,.05)" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:7, flexWrap:"wrap" }}>
                    <span style={{ fontWeight:800, fontSize:14 }}>🎒 {rec.studentName}</span>
                    <span style={{ fontSize:11, fontWeight:700, background:m.color, color:"#fff", borderRadius:20, padding:"2px 9px" }}>{m.icon} {rec.type}</span>
                    {rec.tags?.map(t=><span key={t} style={{ fontSize:11, background:m.bg, color:m.color, borderRadius:20, padding:"2px 7px" }}>#{t}</span>)}
                    <span style={{ marginLeft:"auto", fontSize:11, color:"#cbd5e1" }}>{rec.date}</span>
                    {/* ★ 수정 / 삭제 버튼 */}
                    <button onClick={()=>setEditingRec(rec)} style={{ padding:"4px 9px", borderRadius:7, border:"1px solid #e2e8f0", background:"#fff", color:"#475569", cursor:"pointer", fontSize:11, fontWeight:700 }}>✏️</button>
                    <button onClick={()=>handleDeleteRecord(rec.id)} disabled={deletingId===rec.id}
                      style={{ padding:"4px 9px", borderRadius:7, border:"1px solid #fca5a5", background:"#fff", color:"#dc2626", cursor:"pointer", fontSize:11, fontWeight:700 }}>
                      {deletingId===rec.id?"...":"🗑️"}
                    </button>
                  </div>
                  <div style={{ fontWeight:700, fontSize:13, color:m.color, marginBottom:4 }}>{rec.summary}</div>
                  <div style={{ fontSize:13, color:"#475569", lineHeight:1.75 }}>{rec.content}</div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── 학생별 탭 ── */}
        {tab==="students" && (
          <div>
            {uniqueStudentNames.length===0 ? (
              <div style={{ textAlign:"center", padding:60, color:"#cbd5e1" }}><div style={{ fontSize:40, marginBottom:8 }}>👥</div><div style={{ fontSize:14 }}>아직 기록된 학생이 없어요</div></div>
            ) : uniqueStudentNames.map(name => {
              const recs  = records.filter(r=>r.studentName===name);
              const counts = Object.fromEntries(Object.keys(TYPE_META).map(k=>[k,recs.filter(r=>r.type===k).length]));
              const info   = students.find(s=>s.name===name);
              return (
                <details key={name} style={{ background:"#fff", borderRadius:16, marginBottom:9, overflow:"hidden", boxShadow:"0 1px 8px rgba(0,0,0,.06)" }}>
                  <summary style={{ padding:"15px 17px", cursor:"pointer", listStyle:"none", display:"flex", alignItems:"center", gap:11 }}>
                    <div style={{ width:42, height:42, borderRadius:"50%", background:"#f1f5f9", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>
                      {info?.gender==="여"?"👧":"👦"}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:900, fontSize:15, color:"#1e293b" }}>{name}</div>
                      <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>총 {recs.length}건 · 최근 {recs[0]?.date||"없음"}</div>
                    </div>
                    <div style={{ display:"flex", gap:5, flexWrap:"wrap", justifyContent:"flex-end" }}>
                      {Object.entries(counts).filter(([,v])=>v>0).map(([k,v]) => (
                        <span key={k} style={{ fontSize:11, background:TYPE_META[k].bg, color:TYPE_META[k].color, borderRadius:20, padding:"3px 8px", fontWeight:700 }}>{TYPE_META[k].icon} {v}</span>
                      ))}
                    </div>
                  </summary>
                  <div style={{ borderTop:"1px solid #f1f5f9", padding:"13px 17px", background:"#fafafa", display:"flex", flexDirection:"column", gap:7 }}>
                    {recs.map(rec => {
                      const m = TYPE_META[rec.type] || { color:"#64748b", bg:"#f8fafc", icon:"📝" };
                      return (
                        <div key={rec.id} style={{ padding:"10px 13px", borderRadius:10, background:m.bg, borderLeft:`3px solid ${m.color}` }}>
                          <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:4 }}>
                            <span style={{ fontSize:11, fontWeight:700, color:m.color }}>{m.icon} {rec.type}</span>
                            {rec.tags?.map(t=><span key={t} style={{ fontSize:11, color:"#94a3b8" }}>#{t}</span>)}
                            <span style={{ marginLeft:"auto", fontSize:11, color:"#cbd5e1" }}>{rec.date}</span>
                          </div>
                          <div style={{ fontWeight:700, fontSize:13, marginBottom:3 }}>{rec.summary}</div>
                          <div style={{ fontSize:13, color:"#475569", lineHeight:1.7 }}>{rec.content}</div>
                        </div>
                      );
                    })}
                  </div>
                </details>
              );
            })}
          </div>
        )}

        {/* ── 학생 관리 탭 ── */}
        {tab==="manage" && (
          <StudentManageTab
            students={students} scriptUrl={scriptUrl} semester={curSemester}
            onRefresh={loadData} showToast={showToast}
            onDeleteStudent={id=>setStudents(prev=>prev.filter(s=>s.id!==id))}
          />
        )}

        {/* ── 설정 탭 ── */}
        {tab==="settings" && (
          <div>
            <div style={{ background:"#fff", borderRadius:16, padding:22, boxShadow:"0 2px 12px rgba(0,0,0,.07)", border:"1px solid #e8e4dc", marginBottom:14 }}>
              <div style={{ fontWeight:800, fontSize:16, color:"#1e293b", marginBottom:4 }}>🤖 Claude API 키</div>
              <div style={{ fontSize:13, color:"#64748b", marginBottom:16, lineHeight:1.7 }}>
                AI 분류 기능에 필요해요. console.anthropic.com에서 발급받은 키를 입력하세요.
              </div>
              <div style={{ position:"relative" }}>
                <input type={showApiKey?"text":"password"} value={apiKey} onChange={e=>setApiKey(e.target.value)} placeholder="sk-ant-api03-..."
                  style={{ width:"100%", padding:"11px 44px 11px 13px", borderRadius:10, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", fontFamily:"monospace" }} />
                <button onClick={()=>setShowApiKey(v=>!v)} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", cursor:"pointer", fontSize:16, color:"#94a3b8" }}>
                  {showApiKey?"🙈":"👁️"}
                </button>
              </div>
              {/* ★ sessionStorage 저장 */}
              <button onClick={()=>{ sessionStorage.setItem(API_KEY_KEY,apiKey.trim()); showToast("API 키 저장됐어요! ✅"); }}
                style={{ width:"100%", marginTop:12, padding:13, borderRadius:11, border:"none", background:apiKey.trim()?"#1e293b":"#e2e8f0", color:apiKey.trim()?"#fff":"#94a3b8", fontWeight:700, fontSize:14, cursor:apiKey.trim()?"pointer":"default" }}>
                💾 키 저장하기
              </button>
              <div style={{ marginTop:10, fontSize:12, color:"#064e3b", background:"#f0fdf4", borderRadius:8, padding:"10px 12px", lineHeight:1.7, border:"1px solid #bbf7d0" }}>
                🔒 키는 현재 탭의 메모리에만 저장돼요. <b>탭을 닫으면 자동으로 삭제</b>되어 타인에게 노출되지 않아요.
              </div>
            </div>

            <div style={{ background:"#fff", borderRadius:16, padding:22, boxShadow:"0 2px 12px rgba(0,0,0,.07)", border:"1px solid #e8e4dc" }}>
              <div style={{ fontWeight:800, fontSize:16, color:"#1e293b", marginBottom:4 }}>🔗 구글 시트 연결</div>
              <div style={{ fontSize:13, color:"#64748b", marginBottom:14 }}>현재 연결된 Apps Script URL</div>
              <div style={{ background:"#f8fafc", borderRadius:9, padding:"10px 13px", fontSize:11, color:"#475569", fontFamily:"monospace", wordBreak:"break-all", lineHeight:1.6 }}>
                {scriptUrl||"연결 없음"}
              </div>
              <button onClick={()=>{ localStorage.removeItem(SCRIPT_URL_KEY); setScriptUrl(null); }}
                style={{ width:"100%", marginTop:12, padding:12, borderRadius:11, border:"1.5px solid #fca5a5", background:"#fff", color:"#dc2626", fontWeight:700, fontSize:13, cursor:"pointer" }}>
                🔄 구글 시트 재연결
              </button>
            </div>
          </div>
        )}
      </div>

      {/* ★ AI 미리보기 모달 — 수정 가능 */}
      {preview && (
        <div style={{ position:"fixed", inset:0, background:"rgba(15,23,42,.6)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:"#fff", borderRadius:20, padding:24, maxWidth:500, width:"100%", maxHeight:"90vh", overflow:"auto", boxShadow:"0 24px 64px rgba(0,0,0,.25)" }}>
            <div style={{ fontWeight:900, fontSize:17, color:"#1e293b", marginBottom:4 }}>🔍 AI 분류 결과</div>
            <div style={{ fontSize:12, color:"#64748b", marginBottom:13 }}>저장 전 내용을 직접 수정할 수 있어요</div>
            <div style={{ background:"#f8fafc", borderRadius:9, padding:11, fontSize:13, color:"#64748b", marginBottom:15, fontStyle:"italic", lineHeight:1.7, borderLeft:"3px solid #e2e8f0" }}>"{preview.raw}"</div>
            <div style={{ display:"flex", flexDirection:"column", gap:13, marginBottom:18 }}>
              {preview.parsed.map((p,i) => {
                const m = TYPE_META[p.type] || { color:"#64748b", bg:"#f8fafc", icon:"📝" };
                return (
                  <div key={i} style={{ border:`1.5px solid ${m.color}30`, borderRadius:14, padding:14, background:"#fafafa" }}>
                    {/* 이름 + 유형 */}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", marginBottom:4 }}>🎒 학생 이름</div>
                        <input value={p.studentName} onChange={e=>updatePreview(i,"studentName",e.target.value)}
                          style={{ width:"100%", padding:"7px 10px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", fontWeight:700 }} />
                      </div>
                      <div>
                        <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", marginBottom:4 }}>📂 기록 유형</div>
                        <select value={p.type} onChange={e=>updatePreview(i,"type",e.target.value)}
                          style={{ width:"100%", padding:"7px 10px", borderRadius:8, border:`1.5px solid ${m.color}`, fontSize:12, outline:"none", background:m.bg, color:m.color, fontWeight:700 }}>
                          {Object.keys(TYPE_META).map(t=><option key={t} value={t}>{TYPE_META[t].icon} {t}</option>)}
                        </select>
                      </div>
                    </div>
                    {/* 요약 */}
                    <div style={{ marginBottom:8 }}>
                      <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", marginBottom:4 }}>한줄 요약</div>
                      <input value={p.summary} onChange={e=>updatePreview(i,"summary",e.target.value)}
                        style={{ width:"100%", padding:"7px 10px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", color:m.color, fontWeight:600 }} />
                    </div>
                    {/* 내용 */}
                    <div>
                      <div style={{ fontSize:11, fontWeight:700, color:"#94a3b8", marginBottom:4 }}>내용</div>
                      <textarea value={p.content} onChange={e=>updatePreview(i,"content",e.target.value)} rows={3}
                        style={{ width:"100%", padding:"7px 10px", borderRadius:8, border:"1.5px solid #e2e8f0", fontSize:13, outline:"none", resize:"vertical", fontFamily:"inherit", lineHeight:1.6, color:"#475569" }} />
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{ display:"flex", gap:9 }}>
              <button onClick={()=>setPreview(null)} style={{ flex:1, padding:12, borderRadius:11, border:"1.5px solid #e2e8f0", background:"#fff", cursor:"pointer", fontWeight:700, color:"#64748b" }}>취소</button>
              <button onClick={confirmSave} style={{ flex:2, padding:12, borderRadius:11, border:"none", background:"#1e293b", color:"#fff", cursor:"pointer", fontWeight:700, fontSize:14 }}>💾 저장하기</button>
            </div>
          </div>
        </div>
      )}

      {/* ★ 기록 수정 모달 */}
      {editingRec && (
        <EditRecordModal record={editingRec} scriptUrl={scriptUrl} onSaved={handleRecordSaved} onClose={()=>setEditingRec(null)} />
      )}

      {toast && (
        <div style={{ position:"fixed", bottom:22, left:"50%", transform:"translateX(-50%)", background:toast.ok?"#1e293b":"#dc2626", color:"#fff", padding:"11px 22px", borderRadius:30, fontSize:14, fontWeight:700, boxShadow:"0 4px 20px rgba(0,0,0,.2)", zIndex:400, whiteSpace:"nowrap", animation:"fadeUp .3s ease" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
